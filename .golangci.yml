version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - unused
    - gocyclo
    - misspell
    - ineffassign
    - prealloc
    - bodyclose

  settings:
    gocyclo:
      min-complexity: 25
    gosec:
      severity: medium
      confidence: medium

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
