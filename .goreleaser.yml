# GoReleaser Configuration
# https://goreleaser.com

version: 2

project_name: skillguard

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    builds:
      - skillguard
    files:
      - README.md
      - LICENSE
      - CONTRIBUTING.md

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Version }}-next"

changelog:
  skip: false
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

github:
  owner: OSSAfrica
  name: skillguard

# Build configuration
builds:
  - id: skillguard
    binary: skillguard
    main: ./main.go
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/OSSAfrica/skillguard/cmd.version={{ .Version }}
    env:
      - CGO_ENABLED=0

# Docker configuration
dockers:
  - image_templates:
      - 'OSSAfrica/skillguard:{{ .Version }}'
      - 'OSSAfrica/skillguard:latest'
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - --label=org.opencontainers.image.title=SkillGuard
      - --label=org.opencontainers.image.description=Security scanner for AI agent skills
      - --label=org.opencontainers.image.version={{ .Version }}
      - --label=org.opencontainers.image.source=https://github.com/OSSAfrica/skillguard

# Release configuration
release:
  github:
    owner: OSSAfrica
    name: skillguard
  name_template: '{{ .Tag }}'
  body_template: |
    ## Changes in {{ .Tag }}

    {{ range .Commits }}
    - {{ .Message }}
    {{ end }}

    **Full Changelog**: https://github.com/OSSAfrica/skillguard/compare/{{ .PreviousTag }}...{{ .Tag }}