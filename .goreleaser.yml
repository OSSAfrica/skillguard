# GoReleaser Configuration
# https://goreleaser.com

version: 2

project_name: skillguard

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    builds:
      - skillguard

checksum:
  name_template: 'checksums.txt'

changelog:
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

builds:
  - id: skillguard
    binary: skillguard
    main: ./main.go
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/OSSAfrica/skillguard/cmd.version={{ .Version }}
    env:
      - CGO_ENABLED=0

dockers:
  - image_templates:
      - 'OSSAfrica/skillguard:{{ .Version }}'
      - 'OSSAfrica/skillguard:latest'
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile

release:
  draft: false
