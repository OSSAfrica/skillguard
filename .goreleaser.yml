# GoReleaser Configuration
# https://goreleaser.com

version: 2

project_name: skillguard

archives:
  - id: default
    formats:
      - tar.gz
      - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

builds:
  - id: skillguard-darwin
    binary: skillguard
    main: ./main.go
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X skillguard/cmd.version={{ .Version }}
    env:
      - CGO_ENABLED=0

  - id: skillguard-linux
    binary: skillguard
    main: ./main.go
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X skillguard/cmd.version={{ .Version }}
    env:
      - CGO_ENABLED=0

  - id: skillguard-windows
    binary: skillguard
    main: ./main.go
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X skillguard/cmd.version={{ .Version }}
    env:
      - CGO_ENABLED=0

release:
  draft: false

brews:
  - repository:
      owner: OSSAfrica
      name: homebrew-skillguard
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/OSSAfrica/skillguard"
    description: "Security scanner for AI skill definitions"
    license: "MIT"
    ids:
      - skillguard-darwin
