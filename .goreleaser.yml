# GoReleaser Configuration
# https://goreleaser.com

version: 2

project_name: skillguard

archives:
  - id: default
    formats:
      - tar.gz
      - zip

checksum:
  name_template: 'checksums.txt'

changelog:
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

builds:
  - id: skillguard
    binary: skillguard
    main: ./main.go
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X skillguard/cmd.version={{ .Version }}
    env:
      - CGO_ENABLED=0

release:
  draft: false
