name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          # Get previous tag or use v0.0.0 as base
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.0.0")
          PREV_VERSION=${PREV_TAG#v}
          
          # Get commits since last release
          COMMITS=$(git log --format=%s ${PREV_TAG}..HEAD 2>/dev/null | head -50)
          if [[ -z "$COMMITS" ]]; then
            COMMITS=$(git log --format=%s -1 HEAD)
          fi
          
          # Determine bump type
          MAJOR=0
          MINOR=0
          PATCH=0
          
          for commit in $COMMITS; do
            if [[ "$commit" == *"BREAKING"* ]] || [[ "$commit" == *"breaking change"* ]]; then
              MAJOR=1
              break
            fi
            if [[ "$commit" == feat:* ]] || [[ "$commit" == feat\( ]]; then
              MINOR=1
            fi
          done
          
          # Calculate new version
          MAJOR_NUM=$(echo $PREV_VERSION | cut -d. -f1)
          MINOR_NUM=$(echo $PREV_VERSION | cut -d. -f2)
          PATCH_NUM=$(echo $PREV_VERSION | cut -d. -f3)
          
          if [[ -z "$PATCH_NUM" ]]; then
            PATCH_NUM=0
          fi
          
          if [[ "$MAJOR" == "1" ]]; then
            MAJOR_NUM=$((MAJOR_NUM + 1))
            MINOR_NUM=0
            PATCH_NUM=0
          elif [[ "$MINOR" == "1" ]]; then
            MINOR_NUM=$((MINOR_NUM + 1))
            PATCH_NUM=0
          else
            PATCH_NUM=$((PATCH_NUM + 1))
          fi
          
          VERSION="v${MAJOR_NUM}.${MINOR_NUM}.${PATCH_NUM}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version calculated: $VERSION (major: $MAJOR, minor: $MINOR, patch: $PATCH_NUM)"

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Creating tag: $VERSION"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a $VERSION -m "Release $VERSION"
          git push origin $VERSION
          echo "Tag $VERSION created and pushed"

  release:
    needs: versioning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --timeout 30m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [versioning, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        env:
          VERSION: ${{ needs.versioning.outputs.version }}
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$COMMIT_MSG" == *"BREAKING"* ]]; then
            echo "Type: MAJOR release (breaking change detected)" >> $GITHUB_STEP_SUMMARY
          elif [[ "$COMMIT_MSG" == feat:* ]]; then
            echo "Type: MINOR release (new feature)" >> $GITHUB_STEP_SUMMARY
          else
            echo "Type: PATCH release (bug fixes)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status: Release artifacts built and uploaded" >> $GITHUB_STEP_SUMMARY