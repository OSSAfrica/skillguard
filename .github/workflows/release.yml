name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.0.0")
          PREV_VERSION=${PREV_TAG#v}
          
          COMMITS=$(git log --format=%s ${PREV_TAG}..HEAD 2>/dev/null | head -50)
          if [[ -z "$COMMITS" ]]; then
            COMMITS=$(git log --format=%s -1 HEAD)
          fi
          
          MAJOR=0
          MINOR=0
          PATCH=0
          
          for commit in $COMMITS; do
            if [[ "$commit" == *"BREAKING"* ]] || [[ "$commit" == *"breaking change"* ]]; then
              MAJOR=1
              break
            fi
            if [[ "$commit" == feat:* ]] || [[ "$commit" == feat\( ]]; then
              MINOR=1
            fi
          done
          
          MAJOR_NUM=$(echo $PREV_VERSION | cut -d. -f1)
          MINOR_NUM=$(echo $PREV_VERSION | cut -d. -f2)
          PATCH_NUM=$(echo $PREV_VERSION | cut -d. -f3)
          
          if [[ -z "$PATCH_NUM" ]]; then
            PATCH_NUM=0
          fi
          
          if [[ "$MAJOR" == "1" ]]; then
            MAJOR_NUM=$((MAJOR_NUM + 1))
            MINOR_NUM=0
            PATCH_NUM=0
          elif [[ "$MINOR" == "1" ]]; then
            MINOR_NUM=$((MINOR_NUM + 1))
            PATCH_NUM=0
          else
            PATCH_NUM=$((PATCH_NUM + 1))
          fi
          
          VERSION="v${MAJOR_NUM}.${MINOR_NUM}.${PATCH_NUM}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version calculated: $VERSION"

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Creating tag: $VERSION"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a $VERSION -m "Release $VERSION"
          git push origin $VERSION
          echo "Tag $VERSION created and pushed"

  release:
    needs: versioning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags origin

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: latest
          args: release --clean --timeout 30m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: [versioning, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@d632683dd7b4114ad314bca15554477dd762a938 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@aa2c3e8b13dfb98c21c2c3cbc5d60e90d028c962 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@2d96bd3678d92ed41fce3d5ce573db873a0faf0 # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@343f7c434d92bc62c5b14e03f651e15a5c5f91a # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@8c076059cdd37efc45e4c22a4c7919f50593d00ca # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@59d4e8e7db08b1e17de11c74e4a54c4a8b5cd6ef # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

  notify:
    needs: [versioning, release, docker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        env:
          VERSION: ${{ needs.versioning.outputs.version }}
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$COMMIT_MSG" == *"BREAKING"* ]]; then
            echo "Type: MAJOR release (breaking change detected)" >> $GITHUB_STEP_SUMMARY
          elif [[ "$COMMIT_MSG" == feat:* ]]; then
            echo "Type: MINOR release (new feature)" >> $GITHUB_STEP_SUMMARY
          else
            echo "Type: PATCH release (bug fixes)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- Binaries: Available in GitHub Releases" >> $GITHUB_STEP_SUMMARY
          echo "- Docker: ghcr.io/${{ github.repository }}:$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status: Release artifacts built and uploaded" >> $GITHUB_STEP_SUMMARY
