name: Release

on:
  push:
    branches:
      - main
      - release
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Manual version (e.g., v0.1.0)'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Check if manual version provided
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_RELEASE="true"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if tag pushed
          if [[ "${{ github.ref }}" == "refs/tags/v"* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            IS_RELEASE="true"
            echo "version=v$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto-version from commits
          BASE_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMIT_COUNT=$(git rev-list --count HEAD ^$BASE_VERSION 2>/dev/null || echo "1")

          # Determine bump type from commits
          MAJOR_BUMP=false
          MINOR_BUMP=false

          for commit in $(git log --format=%s HEAD ^$BASE_VERSION 2>/dev/null | head -20); do
            if [[ "$commit" == *"BREAKING"* ]] || [[ "$commit" == *"breaking change"* ]]; then
              MAJOR_BUMP=true
              break
            fi
            if [[ "$commit" == "feat:"* ]] || [[ "$commit" == "feat("* ]]; then
              MINOR_BUMP=true
            fi
          done

          # Calculate new version
          BASE_NUM=$(echo $BASE_VERSION | sed 's/v//' | cut -d. -f1-2)
          MAJOR=$(echo $BASE_NUM | cut -d. -f1)
          MINOR=$(echo $BASE_NUM | cut -d. -f2)
          PATCH=$(echo $BASE_NUM | cut -d. -f3)

          if [[ "$MAJOR_BUMP" == "true" ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$MINOR_BUMP" == "true" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          IS_RELEASE="false"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION (release: $IS_RELEASE)"

  release:
    needs: version
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [version, release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "Release: ${{ needs.version.outputs.is_release }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.version.outputs.is_release }}" == "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Status: Release created successfully" >> $GITHUB_STEP_SUMMARY
          fi