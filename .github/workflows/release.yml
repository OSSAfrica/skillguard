name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.0.0")
          PREV_VERSION=${PREV_TAG#v}
          
          COMMITS=$(git log --format=%s ${PREV_TAG}..HEAD 2>/dev/null | head -50)
          if [[ -z "$COMMITS" ]]; then
            COMMITS=$(git log --format=%s -1 HEAD)
          fi
          
          MAJOR=0
          MINOR=0
          PATCH=0
          
          for commit in $COMMITS; do
            if [[ "$commit" == *"BREAKING"* ]] || [[ "$commit" == *"breaking change"* ]]; then
              MAJOR=1
              break
            fi
            if [[ "$commit" == feat:* ]] || [[ "$commit" == feat\( ]]; then
              MINOR=1
            fi
          done
          
          MAJOR_NUM=$(echo $PREV_VERSION | cut -d. -f1)
          MINOR_NUM=$(echo $PREV_VERSION | cut -d. -f2)
          PATCH_NUM=$(echo $PREV_VERSION | cut -d. -f3)
          
          if [[ -z "$PATCH_NUM" ]]; then
            PATCH_NUM=0
          fi
          
          if [[ "$MAJOR" == "1" ]]; then
            MAJOR_NUM=$((MAJOR_NUM + 1))
            MINOR_NUM=0
            PATCH_NUM=0
          elif [[ "$MINOR" == "1" ]]; then
            MINOR_NUM=$((MINOR_NUM + 1))
            PATCH_NUM=0
          else
            PATCH_NUM=$((PATCH_NUM + 1))
          fi
          
          VERSION="v${MAJOR_NUM}.${MINOR_NUM}.${PATCH_NUM}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version calculated: $VERSION"

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Creating tag: $VERSION"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a $VERSION -m "Release $VERSION"
          git push origin $VERSION
          echo "Tag $VERSION created and pushed"

  release:
    needs: versioning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags origin

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6.4.0
        with:
          go-version: '1.25'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 #v7.0.0
        with:
          version: latest
          args: release --clean --timeout 30m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: [ versioning, release ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a #v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

  chps-score:
    needs: [ docker ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: CHPs Security Check
        id: chps
        uses: chps-dev/chps-scorer-github-action@94ac2c9252014ab100cbd98855d06acb0f5381a4
        with:
          image: ghcr.io/${{ github.repository }}:latest
          dockerfile: ./Dockerfile
          skip-cves: true

      - name: Display CHPs Score
        run: |
          echo "${{ steps.chps.outputs.output }}"

  notify:
    needs: [ versioning, release, docker, chps-score ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        env:
          VERSION: ${{ needs.versioning.outputs.version }}
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$COMMIT_MSG" == *"BREAKING"* ]]; then
            echo "Type: MAJOR release (breaking change detected)" >> $GITHUB_STEP_SUMMARY
          elif [[ "$COMMIT_MSG" == feat:* ]]; then
            echo "Type: MINOR release (new feature)" >> $GITHUB_STEP_SUMMARY
          else
            echo "Type: PATCH release (bug fixes)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- Binaries: Available in GitHub Releases" >> $GITHUB_STEP_SUMMARY
          echo "- Docker: ghcr.io/${{ github.repository }}:$VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status: Release artifacts built and uploaded" >> $GITHUB_STEP_SUMMARY
