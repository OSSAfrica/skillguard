name: Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write

jobs:
  versioning:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "v0.0.0")
          PREV_VERSION=${PREV_TAG#v}
          
          COMMITS=$(git log --format=%s ${PREV_TAG}..HEAD 2>/dev/null | head -50)
          if [[ -z "$COMMITS" ]]; then
            COMMITS=$(git log --format=%s -1 HEAD)
          fi
          
          MAJOR=0
          MINOR=0
          PATCH=0
          
          for commit in $COMMITS; do
            if [[ "$commit" == *"BREAKING"* ]] || [[ "$commit" == *"breaking change"* ]]; then
              MAJOR=1
              break
            fi
            if [[ "$commit" == feat:* ]] || [[ "$commit" == feat\( ]]; then
              MINOR=1
            fi
          done
          
          MAJOR_NUM=$(echo $PREV_VERSION | cut -d. -f1)
          MINOR_NUM=$(echo $PREV_VERSION | cut -d. -f2)
          PATCH_NUM=$(echo $PREV_VERSION | cut -d. -f3)
          
          if [[ -z "$PATCH_NUM" ]]; then
            PATCH_NUM=0
          fi
          
          if [[ "$MAJOR" == "1" ]]; then
            MAJOR_NUM=$((MAJOR_NUM + 1))
            MINOR_NUM=0
            PATCH_NUM=0
          elif [[ "$MINOR" == "1" ]]; then
            MINOR_NUM=$((MINOR_NUM + 1))
            PATCH_NUM=0
          else
            PATCH_NUM=$((PATCH_NUM + 1))
          fi
          
          VERSION="v${MAJOR_NUM}.${MINOR_NUM}.${PATCH_NUM}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a $VERSION -m "Release $VERSION"
          git push origin $VERSION

  release:
    needs: versioning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - run: git fetch --tags origin

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.25'
          cache: true

      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8
        with:
          version: latest
          args: release --clean --timeout 30m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  docker:
    needs: [ versioning, release ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set lowercase repo name
        run: |
          echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ghcr.io/${{ env.REPO }}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO }}:latest
          platforms: linux/amd64,linux/arm64

  sign:
    needs: [ versioning, docker ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Set lowercase repo name
        run: |
          echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for image
        run: |
          for i in {1..5}; do
            docker pull ghcr.io/${{ env.REPO }}:latest && break
            sleep 5
          done

      - run: cosign sign --yes ghcr.io/${{ env.REPO }}:latest
      - run: cosign verify --certificate-identity-regexp ".*" --certificate-oidc-issuer-regexp ".*actions.githubusercontent.com.*" ghcr.io/${{ env.REPO }}:latest

  sbom:
    needs: [ versioning, release, docker ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Set lowercase repo name
        run: |
          echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: docker pull ghcr.io/${{ env.REPO }}:latest

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ghcr.io/${{ env.REPO }}:latest
          output-file: skillguard-sbom.spdx

      - name: Upload SBOM to Release
        run: |
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          VERSION="${{ needs.versioning.outputs.version }}"
          GH_ASSET="skillguard-${VERSION}-sbom.spdx"
          mv skillguard-sbom.spdx "$GH_ASSET"
          
          RELEASE_ID=$(gh release view "$VERSION" --json id -q .id)
          
          curl -sL \
            -X POST "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${GH_ASSET}&label=SBOM" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"$GH_ASSET"

  notify:
    needs: [ versioning, release, docker, sign, sbom ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Version: ${{ needs.versioning.outputs.version }}" >> $GITHUB_STEP_SUMMARY